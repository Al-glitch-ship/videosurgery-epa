name: Deploy to Cloud Run

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: spheric-mesh-493602-k8
  REGION: us-central1
  SERVICE_NAME: videosurgery-epa

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:us-central1:videosurgery-db \
            --port 3000 \
            --set-env-vars "NODE_ENV=production,JWT_SECRET=${{ secrets.JWT_SECRET }},VITE_APP_ID=videosurgery-epa,DATABASE_URL=mysql://root:VideoSurgery2025@/videosurgery?socketPath=/cloudsql/${{ env.PROJECT_ID }}:us-central1:videosurgery-db,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GCS_BUCKET=${{ env.PROJECT_ID }}-videos" \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --quiet
